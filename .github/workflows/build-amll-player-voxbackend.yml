name: Build AMLL Player VoxBackend

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-amll-player-voxbackend.yml"
      - "Amll-Player-Voxbackend/**"
      - "amll-ws-client/**"
      - "audio/**"
      - "dsp/**"
      - "player/**"
      - "player-plugin/**"
      - "separator/**"
      - "go.mod"
      - "go.sum"
      - "*.go"
  pull_request:
    paths:
      - ".github/workflows/build-amll-player-voxbackend.yml"
      - "Amll-Player-Voxbackend/**"
      - "amll-ws-client/**"
      - "audio/**"
      - "dsp/**"
      - "player/**"
      - "player-plugin/**"
      - "separator/**"
      - "go.mod"
      - "go.sum"
      - "*.go"

env:
  GO_VERSION: "1.25.1"
  NODE_VERSION: "22"
  ORT_VERSION: "1.25.1"
  ORT_URL: "https://github.com/microsoft/onnxruntime/releases/download/v1.25.1/onnxruntime-win-x64-1.25.1.zip"
  UMXL_VOCALS_URL: "https://huggingface.co/chinedudave06/demucs-onnx/resolve/main/umxl_vocals.onnx"
  KARA2_URL: "https://huggingface.co/seanghay/uvr_models/resolve/main/UVR_MDXNET_KARA_2.onnx"
  APP_NAME: "VoxBackend-AMLL"

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout VoxBackend
        uses: actions/checkout@v4
        with:
          path: VoxBackend

      - name: Checkout FluxUI sibling dependency
        uses: actions/checkout@v4
        with:
          repository: xiaowumin-mark/FluxUI
          path: FluxUI

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: VoxBackend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: VoxBackend/player-plugin/package-lock.json

      - name: Restore bundled binary download cache
        uses: actions/cache@v4
        with:
          path: |
            VoxBackend/.downloads/onnxruntime
            VoxBackend/.downloads/models
            VoxBackend/.downloads/onnxruntime-win-x64-${{ env.ORT_VERSION }}.zip
          key: amll-player-binary-assets-${{ runner.os }}-ort-${{ env.ORT_VERSION }}-models-v1

      - name: Install gogio
        working-directory: VoxBackend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          go install gioui.org/cmd/gogio@latest
          $goBin = Join-Path (go env GOPATH) "bin"
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build FluxUI app with gogio
        working-directory: VoxBackend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path ".build" | Out-Null
          gogio -target windows -o ".build\VoxBackend-AMLL.exe" ".\Amll-Player-Voxbackend"
          if (-not (Test-Path ".build\VoxBackend-AMLL.exe")) {
            throw "gogio build did not produce .build\VoxBackend-AMLL.exe"
          }

      - name: Build AMLL JavaScript plugin
        working-directory: VoxBackend/player-plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm ci
          npm run build:action
          if (-not (Test-Path ".action-build\vox-backend v0.0.1.js")) {
            throw "plugin build did not produce .action-build\vox-backend v0.0.1.js"
          }

      - name: Download ONNX Runtime and bundled models
        working-directory: VoxBackend
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path ".downloads" | Out-Null
          if ([string]::IsNullOrWhiteSpace($env:HF_TOKEN)) {
            Write-Host "HF_TOKEN secret is not set; Hugging Face model downloads will be anonymous and may be rate limited."
          } else {
            Write-Host "HF_TOKEN secret is set; Hugging Face model downloads will use authenticated requests."
          }

          function Test-UsableFile {
            param(
              [Parameter(Mandatory = $true)][string]$Path,
              [int64]$MinBytes = 1
            )
            return (Test-Path $Path) -and ((Get-Item $Path).Length -ge $MinBytes)
          }

          function Invoke-DownloadWithBackoff {
            param(
              [Parameter(Mandatory = $true)][string]$Url,
              [Parameter(Mandatory = $true)][string]$OutFile,
              [Parameter(Mandatory = $true)][string]$Name,
              [int64]$MinBytes = 1,
              [switch]$UseHuggingFaceToken
            )

            if (Test-UsableFile -Path $OutFile -MinBytes $MinBytes) {
              Write-Host "$Name already exists in cache: $OutFile"
              return
            }

            $parent = Split-Path -Parent $OutFile
            New-Item -ItemType Directory -Force -Path $parent | Out-Null

            $curlArgs = @(
              "-L",
              "--fail",
              "--retry", "3",
              "--retry-all-errors",
              "--retry-delay", "5",
              "--connect-timeout", "30",
              "--max-time", "1800",
              "--user-agent", "VoxBackend-AMLL-CI/1.0",
              "-o", $OutFile
            )
            if ($UseHuggingFaceToken -and -not [string]::IsNullOrWhiteSpace($env:HF_TOKEN)) {
              $curlArgs += @("-H", "Authorization: Bearer $env:HF_TOKEN")
            }
            $curlArgs += $Url

            $delays = @(15, 30, 60, 120, 240, 300, 300, 300)
            for ($attempt = 0; $attempt -lt $delays.Count; $attempt++) {
              if (Test-Path $OutFile) {
                Remove-Item -LiteralPath $OutFile -Force
              }

              Write-Host "Downloading $Name (attempt $($attempt + 1) of $($delays.Count))"
              & curl.exe @curlArgs
              if ($LASTEXITCODE -eq 0 -and (Test-UsableFile -Path $OutFile -MinBytes $MinBytes)) {
                Write-Host "$Name downloaded: $OutFile"
                return
              }

              if ($attempt -lt ($delays.Count - 1)) {
                $delay = $delays[$attempt]
                Write-Host "$Name download failed, retrying in $delay seconds"
                Start-Sleep -Seconds $delay
              }
            }

            throw "$Name was not downloaded. If Hugging Face returned HTTP 429, add a repository secret named HF_TOKEN or rerun after the rate limit cools down."
          }

          $ortZip = ".downloads\onnxruntime-win-x64-$env:ORT_VERSION.zip"
          $runtimeDll = ".downloads\onnxruntime\onnxruntime-win-x64-$env:ORT_VERSION\lib\onnxruntime.dll"
          if (-not (Test-Path $runtimeDll)) {
            Invoke-DownloadWithBackoff -Url $env:ORT_URL -OutFile $ortZip -Name "ONNX Runtime" -MinBytes 10000000
            Expand-Archive -Path $ortZip -DestinationPath ".downloads\onnxruntime" -Force
          } else {
            Write-Host "ONNX Runtime already exists in cache"
          }

          New-Item -ItemType Directory -Force -Path ".downloads\models" | Out-Null
          Invoke-DownloadWithBackoff -Url $env:UMXL_VOCALS_URL -OutFile ".downloads\models\umxl_vocals.onnx" -Name "umxl_vocals.onnx" -MinBytes 1000000 -UseHuggingFaceToken
          Invoke-DownloadWithBackoff -Url $env:KARA2_URL -OutFile ".downloads\models\UVR_MDXNET_KARA_2.onnx" -Name "UVR_MDXNET_KARA_2.onnx" -MinBytes 1000000 -UseHuggingFaceToken

          $runtimeRoot = Get-ChildItem ".downloads\onnxruntime" -Directory |
            Where-Object { $_.Name -like "onnxruntime-win-x64-*" } |
            Select-Object -First 1
          if (-not $runtimeRoot) {
            throw "Cannot find extracted ONNX Runtime directory"
          }
          if (-not (Test-Path (Join-Path $runtimeRoot.FullName "lib\onnxruntime.dll"))) {
            throw "Cannot find ONNX Runtime DLL in extracted archive"
          }

          if (-not (Test-Path ".downloads\models\umxl_vocals.onnx")) {
            throw "umxl_vocals.onnx was not downloaded"
          }
          if (-not (Test-Path ".downloads\models\UVR_MDXNET_KARA_2.onnx")) {
            throw "UVR_MDXNET_KARA_2.onnx was not downloaded"
          }

      - name: Stage package files
        working-directory: VoxBackend
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageRoot = "dist\$env:APP_NAME"
          Remove-Item -LiteralPath $packageRoot -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item ".build\VoxBackend-AMLL.exe" (Join-Path $packageRoot "VoxBackend-AMLL.exe") -Force

          $runtimeRoot = Get-ChildItem ".downloads\onnxruntime" -Directory |
            Where-Object { $_.Name -like "onnxruntime-win-x64-*" } |
            Select-Object -First 1
          $runtimePath = $runtimeRoot.FullName
          Copy-Item $runtimePath (Join-Path $packageRoot "onnxruntime") -Recurse -Force

          New-Item -ItemType Directory -Force -Path (Join-Path $packageRoot "onnx") | Out-Null
          Copy-Item ".downloads\models\umxl_vocals.onnx" (Join-Path $packageRoot "onnx\umxl_vocals.onnx") -Force
          Copy-Item ".downloads\models\UVR_MDXNET_KARA_2.onnx" (Join-Path $packageRoot "onnx\UVR_MDXNET_KARA_2.onnx") -Force

          New-Item -ItemType Directory -Force -Path (Join-Path $packageRoot "extensions") | Out-Null
          Copy-Item "player-plugin\.action-build\vox-backend v0.0.1.js" (Join-Path $packageRoot "extensions\vox-backend v0.0.1.js") -Force

          $readme = @"
          VoxBackend AMLL Player Windows x64

          Run VoxBackend-AMLL.exe from this folder.

          Bundled default paths used by the app:
          - ONNX Runtime: .\onnxruntime\lib\onnxruntime.dll
          - Default model: .\onnx\umxl_vocals.onnx

          Bundled ONNX models:
          - .\onnx\umxl_vocals.onnx
          - .\onnx\UVR_MDXNET_KARA_2.onnx

          Bundled AMLL plugin:
          - .\extensions\vox-backend v0.0.1.js
          "@
          $readme.Trim() | Set-Content -Path (Join-Path $packageRoot "README.txt") -Encoding utf8

          if (-not (Test-Path (Join-Path $packageRoot "VoxBackend-AMLL.exe"))) {
            throw "Package staging failed"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxBackend-AMLL-windows-x64
          path: VoxBackend/dist/VoxBackend-AMLL/**
          if-no-files-found: error
          retention-days: 30
